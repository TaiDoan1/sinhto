services:
  postgres:
    image: postgres:16-alpine
    container_name: sinhto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sinhto
      POSTGRES_PASSWORD: sinhto
      POSTGRES_DB: sinhto
    ports:
      - "5432:5432"
    volumes:
      - sinhto_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sinhto -d sinhto"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sinhto_pg_data:
