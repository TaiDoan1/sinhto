services:
  - type: web
    name: fitblend-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_SQLITE
        value: "false"
      - key: DATABASE_URL
        sync: false
